<!doctype html>
<html lang="en" ng-app="battleshipsApp">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Battleships - Django + Angular</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular-sanitize.min.js"></script>
    <link rel="stylesheet" href="/static/game/styles.css" />
  </head>
  <body ng-controller="GameController as game">
    <main>
      <h1>Battleships</h1>
      <p>Back-end: Django API. Front-end: AngularJS + Canvas UI.</p>
      <p><a href="/admin/">Admin settings</a> (configure grid size and colors).</p>
      <div class="controls">
        <button ng-click="game.startNewGame()">Start New Game</button>
        <button ng-click="game.solveGame()" ng-disabled="game.isSolverRunning">Solve Automatically</button>
      </div>
      <p class="status">{{ game.statusMessage }}</p>

      <section class="boards">
        <div>
          <h2>Enemy Waters (click to fire)</h2>
          <canvas
            id="enemyCanvas"
            width="420"
            height="420"
            ng-click="game.handleEnemyClick($event)">
          </canvas>
        </div>
        <div>
          <h2>Your Fleet</h2>
          <canvas id="playerCanvas" width="420" height="420"></canvas>
        </div>
      </section>

      <div class="result-popup" ng-if="game.showResultPopup">
        <div class="result-popup__card">
          <h2>{{ game.popupTitle }}</h2>
          <p>{{ game.popupMessage }}</p>
          <div class="controls controls--popup">
            <button ng-click="game.startNewGame()">Play Again</button>
            <button ng-click="game.closePopup()">Close</button>
          </div>
        </div>
      </div>
    </main>
    {{ ui_config|json_script:"ui-config" }}
    <script src="/static/game/app.js"></script>
  </body>
</html>
